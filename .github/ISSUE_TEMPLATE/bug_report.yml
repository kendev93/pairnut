name: Bug report
description: Report a PairNut bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that trigger the bug.
      placeholder: |
        1. Open PairNut
        2. Go to ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PairNut version
      placeholder: v0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Error output or screenshots
      render: text
