name: Feature request
description: Suggest a PairNut improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What merchant workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what PairNut should do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Local desktop
        - Import/export
        - Matching algorithm
        - Cloud sync
        - Other
    validations:
      required: true
