name: Build desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"
  APP_NAME: PairNut
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Resolve package version
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Run tests
        run: pytest -q

      - name: Build icons
        run: python scripts/build_icons.py

      - name: Build executable
        shell: pwsh
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "${{ env.APP_NAME }}"
          --icon "build/icons/icon.ico"
          --add-data "assets;assets"
          main.py

      - name: Rename executable
        shell: pwsh
        run: Move-Item "dist/${{ env.APP_NAME }}.exe" "dist/${{ env.APP_NAME }}-$env:PACKAGE_VERSION-windows-x64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: PairNut-windows-x64
          path: dist/PairNut-*-windows-x64.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS dmg
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Resolve package version
        run: |
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          echo "PACKAGE_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Run tests
        run: pytest -q

      - name: Build icons
        run: python scripts/build_icons.py

      - name: Build app bundle
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onedir
          --windowed
          --name "${APP_NAME}"
          --icon "build/icons/icon.icns"
          --add-data "assets:assets"
          main.py

      - name: Create dmg
        run: |
          mkdir -p dist/dmg
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "dist/${APP_NAME}.app" \
            -ov \
            -format UDZO \
            "dist/dmg/${APP_NAME}-${PACKAGE_VERSION}-macOS-${{ runner.arch }}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: PairNut-macOS-${{ runner.arch }}
          path: dist/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "PairNut ${TAG_NAME}" \
            --generate-notes
